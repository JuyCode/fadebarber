<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barbería - Reserva de Turnos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Reserva tu Turno</h1>
    </header>

    <main class="container">
        <section id="step-1" class="booking-section active">
            <h2>Selecciona tu Barbero</h2>
            <div class="cards-grid">
                <label class="card-option">
                    <input type="radio" name="barber" value="Marcos">
                    <div class="card-content">
                        <img src="rigby.jpg" alt="Marcos" class="avatar">
                        <h3>Marcos</h3>
                        <p>------</p>
                    </div>
                </label>
                <label class="card-option">
                    <input type="radio" name="barber" value="Franco">
                    <div class="card-content">
                        <img src="timi_torner.jpg" alt="Franco" class="avatar">
                        <h3>Franco</h3>
                        <p>------</p>
                    </div>
                </label>
            </div>
            <div class="action-container">
                <button class="btn-next" onclick="nextStep(2)">Siguiente</button>
            </div>
        </section>

        <section id="step-2" class="booking-section">
            <h2>Selecciona el Servicio</h2>
            <div class="services-list">
                <label class="service-option">
                    <input type="radio" name="service" value="Corte ($1200)">
                    <div class="service-content">
                        <span class="service-name">Corte de Pelo</span>
                        <span class="service-price">$1200</span>
                    </div>
                </label>
                <label class="service-option">
                    <input type="radio" name="service" value="Barba ($800)">
                    <div class="service-content">
                        <span class="service-name">Perfilado / Afeitado de Barba</span>
                        <span class="service-price">$800</span>
                    </div>
                </label>
                <label class="service-option">
                    <input type="radio" name="service" value="Mechas ($2000)">
                    <div class="service-content">
                        <span class="service-name">Mechas / Reflejos</span>
                        <span class="service-price">$2000</span>
                    </div>
                </label>
                <label class="service-option">
                    <input type="radio" name="service" value="Global ($3500)">
                    <div class="service-content">
                        <span class="service-name">Color Global / Tintura completo</span>
                        <span class="service-price">$3500</span>
                    </div>
                </label>
            </div>
            <div class="action-container navigation-buttons">
                <button class="btn-prev" onclick="prevStep(1)">Atrás</button>
                <button class="btn-next" onclick="nextStep(3)">Siguiente</button>
            </div>
        </section>

        <section id="step-3" class="booking-section">
            <h2>Fecha y Horario</h2>
            
            <div class="date-picker-container">
                <label for="appointment-date">Elegí el día:</label>
                <input type="date" id="appointment-date" name="appointment-date">
            </div>

            <div class="time-grid">
                <label class="time-option">
                    <input type="radio" name="time" value="09:00">
                    <span>09:00 AM</span>
                </label>
                <label class="time-option">
                    <input type="radio" name="time" value="10:00">
                    <span>10:00 AM</span>
                </label>
                <label class="time-option">
                    <input type="radio" name="time" value="16:00">
                    <span>16:00 PM</span>
                </label>
                <label class="time-option">
                    <input type="radio" name="time" value="17:00">
                    <span>17:00 PM</span>
                </label>
            </div>
            <div class="action-container navigation-buttons">
                <button class="btn-prev" onclick="prevStep(2)">Atrás</button>
                <button class="btn-next" onclick="nextStep(4)">Siguiente</button>
            </div>
        </section>

        <section id="step-4" class="booking-section">
            <h2>Pago y Contacto</h2>
            
            <div class="payment-options">
                <label class="payment-card">
                    <input type="radio" name="payment" value="Efectivo">
                    <div class="card-content">
                        <h3>Efectivo</h3>
                        <p>Abonás en el local</p>
                    </div>
                </label>
                <label class="payment-card">
                    <input type="radio" name="payment" value="Mercado Pago">
                    <div class="card-content">
                        <h3>Mercado Pago</h3>
                        <p>Transferencia / Tarjeta</p>
                    </div>
                </label>
            </div>

            <div class="client-info-container">
                <label for="client-name">Tu Nombre:</label>
                <input type="text" id="client-name" placeholder="Ej: Luis Catorcino" required>

                <label for="client-phone">Tu número de WhatsApp:</label>
                <input type="tel" id="client-phone" placeholder="Ej: 3884XXXXXX" required>
            </div>

            <div class="action-container navigation-buttons">
                <button class="btn-prev" onclick="prevStep(3)">Atrás</button>
                <button class="btn-confirmar" onclick="confirmarTurno()">Confirmar Turno </button>
            </div>
        </section>
    </main>

    <footer>
        <p>¿Consultas? Escribinos directamente al +54 9 388 XXX-XXXX</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
